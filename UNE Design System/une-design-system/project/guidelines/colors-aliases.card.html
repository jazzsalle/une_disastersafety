<!-- @dsCard group="Colors" viewport="700x260" name="Semantic aliases" subtitle="text · surface · border · icon roles" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
body{margin:0;font-family:var(--font-ui);background:#fff;padding:16px;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.chip{border:1px solid var(--color-border-subtle,#ebecf0);border-radius:4px;padding:8px 10px;display:flex;align-items:center;gap:8px}
.dot{width:18px;height:18px;border-radius:4px;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.n{color:#444a57;font-size:10.5px}
h4{margin:10px 0 6px;font-size:11px;color:#1c202a}
h4:first-child{margin-top:0}
</style></head><body>
<h4>Text</h4><div class="grid" id="t"></div>
<h4>Surface</h4><div class="grid" id="s"></div>
<h4>Border</h4><div class="grid" id="b"></div>
<script>
const mk=(id,names,prefix)=>document.getElementById(id).innerHTML=names.map(n=>`<div class="chip"><div class="dot" style="background:var(--color-${prefix}-${n})"></div><span class="n">${prefix}/${n}</span></div>`).join('');
mk('t',['primary','secondary','tertiary','disabled','brand','error','success','warning'],'text');
mk('s',['primary','subtle','muted','brand','brand-subtle','error-subtle','success-subtle','warning-subtle'],'surface');
mk('b',['default','subtle','muted','strong','brand','error','success','warning'],'border');
</script>
</body></html>
